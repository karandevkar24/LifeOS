<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login | LifeOS</title>

<link rel="stylesheet"
href="assets/css/main.css">

</head>

<body>

<div class="background">
    <div class="circle circle1"></div>
    <div class="circle circle2"></div>
</div>

<div class="login-card">

<h1>LifeOS</h1>

<h2>Welcome Back</h2>

<p>Login to continue your journey.</p>

<form id="loginForm">

    <input
        type="email"
        id="loginEmail"
        placeholder="Email">

    <input
        type="password"
        id="loginPassword"
        placeholder="Password">

    <button type="submit">
        Login
    </button>

</form>

<p class="signup-link">

Don't have an account?

<a href="signup.html">

Sign Up

</a>

</p>

</div>

</div>
<script src="assets/js/login.js"></script>

</body>

</html>
