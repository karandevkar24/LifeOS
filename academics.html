<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academics | LifeOS</title>

    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/academics.css">
</head>

<body>

<div class="background">
    <div class="circle circle1"></div>
    <div class="circle circle2"></div>
</div>

<div class="academics-container">

    <h1>🎓 Academics</h1>

    <div class="stats">

        <div class="stat-card">
            <h3>Current CGPA</h3>
            <p id="cgpaValue">8.91</p>
        </div>

        <div class="stat-card">
            <h3>Assignments</h3>
            <p id="assignmentCount">0</p>
        </div>

        <div class="stat-card">
            <h3>Attendance</h3>
            <p id="attendanceValue">0%</p>
        </div>

        <div class="stat-card">
            <h3>Class Tests</h3>
            <p id="testCount">0</p>
        </div>

    </div>

</div>

<script src="assets/js/academics.js"></script>

</body>
</html>
